<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="dashboard">

        <div class="card">
            <span class="card__icone">👥</span>
            <span class="card__rotulo">Usuários</span>
            <span class="card__valor">10.400</span>
        </div>

        <div class="card">
            <span class="card__icone">💰</span>
            <span class="card__rotulo">Receita</span>
            <span class="card__valor">R$ 1.200.000,00</span>
        </div>

        <div class="card">
            <span class="card__icone">📦</span>
            <span class="card__rotulo">Pedidos</span>
            <span class="card__valor">5.789</span>
        </div>

        <div class="card">
            <span class="card__icone">⭐</span>
            <span class="card__rotulo">Avaliações</span>
            <span class="card__valor">4.8 / 5</span>
        </div>
        
    </main>
</body>
</html>
